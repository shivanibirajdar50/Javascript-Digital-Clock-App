<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock app</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
  <div class="container">
      <!-- Header Section -->
      <div class="header">
          <p class="greeting" id="greetingText">✨ Welcome! ✨</p>
          <p class="motivation" id="motivationText">🌟 Make every moment count 🌟</p>
      </div>
      
      <div class="timer">
        <h1 id="timerText">00:00:00</h1>
        <p id="statusText">PM</p>
      </div>   
      
      <h2 id="dateText">12/12/2025</h2>
      
      <!-- Footer Section -->
      <div class="footer">
          <p class="time-quote" id="quoteText">"Time is precious, waste it wisely"</p>
          <div class="time-stats">
              <span>⚡ Stay focused</span>
              <span>💪 Keep going</span>
              <span>🎯 Stay positive</span>
          </div>
      </div>
   </div>
</body>
</html>
